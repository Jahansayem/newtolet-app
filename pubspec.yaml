name: newtolet
description: "NewTolet - House rental platform with MLM agent system for Bangladesh"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  url_launcher: ^6.3.1
  intl: ^0.20.2
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  # json_annotation not needed - using manual fromJson/toJson
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/newtolet_app_icon.png
  adaptive_icon_background: "#145A36"
  adaptive_icon_foreground: assets/icons/newtolet_app_icon_foreground.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
