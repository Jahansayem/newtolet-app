<body class="bg-surface font-body text-on-surface antialiased pb-32">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 bg-[#f7fbf0]/80 dark:bg-[#181d17]/80 backdrop-blur-xl transition-colors">
<div class="flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="hover:bg-[#e0e4da] dark:hover:bg-[#2e352b] transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-[#0d631b] dark:text-[#4ade80]">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-semibold text-lg tracking-tight text-[#0d631b] dark:text-[#4ade80]">Add Listing</h1>
</div>
<div class="flex items-center gap-2">
<span class="font-['Manrope'] font-bold text-[#0d631b]">Step 2/2</span>
</div>
</div>
</header>
<main class="max-w-3xl mx-auto px-6 pt-8 space-y-12">
<!-- Progress Indicator -->
<div class="space-y-4">
<div class="flex justify-between items-center text-sm font-semibold text-primary">
<span>Location &amp; Media</span>
<span>100%</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full signature-gradient w-full"></div>
</div>
</div>
<!-- Section 1: Photos -->
<section class="space-y-6">
<div class="flex items-baseline justify-between">
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-background">Visual Gallery</h2>
<span class="text-sm font-medium text-outline">Up to 10 photos</span>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
<div class="aspect-square rounded-2xl bg-surface-container-highest border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center gap-2 hover:bg-surface-container-high transition-colors cursor-pointer group">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">add_a_photo</span>
</div>
<span class="text-xs font-bold uppercase tracking-widest text-primary">Add Photo</span>
</div>
<div class="aspect-square rounded-2xl overflow-hidden relative group">
<img class="w-full h-full object-cover" data-alt="Modern minimalist living room with large windows, light oak floors, and contemporary furniture in soft neutral tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEKJnSKixR8VK-lp3l-c5P5t71PjJ14NRk9uJCDvTmR9XG0lY2g9uMX1Zd-xjNj3WR3Mu3GHPB4_ZcVEHoHIrZEdF-zZdPleYeHEIYIRCPCrjJNF-dZPRlv-OKTaoJUcs2SP4b766fxTid2bDedZ_i6IRh3k-l0idIMhSmUGzGMwTOZdl_JyX0MGEpXpqDDDf_91SB7Jl8PocLdrgw4tlE4Ccz4mJav9H0fpQ2eMfuOzyZPAclIwEsPfwmwGUWAKcJmSyNkUr6Qbc"/>

<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<div class="aspect-square rounded-2xl overflow-hidden relative group hidden md:block">
<img class="w-full h-full object-cover" data-alt="Close-up of high-end kitchen marble countertop with designer faucet and warm natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnVCwFBMwmSGhYIvdNMAJAkXVnWus6vf-9vavMUW0aJmJC2vWcDqybCpDvPxANi4uPCaNf9GbFwpIvtsHGlIch3hzqoulNGO0ABaI30cdkd6UbSYxBXTQPdVpOgSlgpIVMY5naWkDDYXUHDhsBTkE42ATBxcDNtZiw96G3dSj6ePx-0WGqiO1t0uZEl0Mq_saUHspNBRn59iRDaJg2Bzka9IIbSdtwjilse1VpuuZucpJqL-mASzxKc01KBMnukeSoMoIWX95-BSk"/>
<button class="absolute top-2 right-2 bg-on-background/40 backdrop-blur-md p-1.5 rounded-full text-white">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>
</section>
<!-- Section 2: Location -->
<section class="space-y-8 bg-surface-container-low p-8 rounded-[2rem]">
<h2 class="font-headline text-2xl font-bold tracking-tight flex items-center gap-3">
<span class="material-symbols-outlined text-primary">location_on</span>
                Location Details
            </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<!-- Division -->
<!-- District -->
<!-- Thana -->
<div class="space-y-2 md:col-span-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1">Short Address</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary rounded-xl py-3 px-4 font-medium placeholder:text-outline/50" placeholder="e.g., Green Valley, North Cascades" type="text"/>
</div>
<!-- Road/House -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1">Road / House No.</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary rounded-xl py-3 px-4 font-medium" placeholder="e.g. Road 12, House 45" type="text"/>
</div>
<!-- Contact -->
<div class="space-y-2 md:col-span-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1">Contact Number</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-primary">+880</span>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary rounded-xl py-3 pl-16 pr-4 font-medium" placeholder="1XXX XXXXXX" type="tel"/>
</div>
</div>
</div>
<!-- Map Placeholder -->
<div class="w-full h-48 rounded-2xl overflow-hidden relative group cursor-pointer">

</div>
</section>
<!-- Section 3: Amenities -->
<section class="space-y-6">
<h2 class="font-headline text-2xl font-bold tracking-tight">Premium Amenities</h2>
<div class="flex flex-wrap gap-3">
<!-- Gas -->
<button class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary-container text-on-primary-container font-semibold transition-all shadow-sm">
<span class="material-symbols-outlined text-[20px]">local_fire_department</span>
<span>Gas</span>
</button>
<!-- Water -->
<button class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary-container text-on-primary-container font-semibold transition-all shadow-sm">
<span class="material-symbols-outlined text-[20px]">water_drop</span>
<span>Water</span>
</button>
<!-- Electricity -->
<button class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary-container text-on-primary-container font-semibold transition-all shadow-sm">
<span class="material-symbols-outlined text-[20px]">bolt</span>
<span>Electricity</span>
</button>
<!-- Lift -->
<button class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high font-semibold transition-all">
<span class="material-symbols-outlined text-[20px]">elevator</span>
<span>Lift</span>
</button>
<!-- Parking -->
<button class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high font-semibold transition-all">
<span class="material-symbols-outlined text-[20px]">garage</span>
<span>Garage</span>
</button>
<!-- Security -->
<button class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high font-semibold transition-all">
<span class="material-symbols-outlined text-[20px]">security</span>
<span>Security</span>
</button><button class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high font-semibold transition-all">
<span class="material-symbols-outlined text-[20px]">chair</span>
<span>With Furniture</span>
</button>
<!-- Generator -->
<!-- Gym -->
</div>
</section>
</main>
<!-- Footer Navigation (Back/Next) -->
<footer class="fixed bottom-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-xl">
<div class="max-w-3xl mx-auto px-6 h-24 flex items-center justify-between gap-6">
<button class="flex-1 py-4 px-6 rounded-2xl bg-surface-container-highest text-primary font-bold hover:bg-surface-dim transition-all active:scale-95">
                Back
            </button>
<button class="flex-[2] py-4 px-6 rounded-2xl signature-gradient text-on-primary font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
                Complete Listing
                <span class="material-symbols-outlined">check_circle</span>
</button>
</div>
</footer>
<!-- BottomNavBar (Suppressed due to Task-Focus/Transactional rule) -->
</body></html>
