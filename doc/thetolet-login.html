            <script>
            function chnagePassType() {
                var l_pass = document.getElementById("l-password");
                var show_pass_button = document.getElementById("show_pass_button");
                if (l_pass.type === "password") {
                    l_pass.type = "text";
                    show_pass_button.innerHTML = "Hide";
                } else {
                    l_pass.type = "password";
                    show_pass_button.innerHTML = "Show";
                }
            }
        </script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.3/js/intlTelInput.min.js"></script>
        <script>
            var phone_number = window.intlTelInput(document.querySelector("#lo-verify-number"), {

                separateDialCode: true,
                preferredCountries: ["bd"],
                onlyCountries: ["bd", "in", "np"],
                hiddenInput: ["contact"],

                utilsScript: "//cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.3/js/utils.js"
            });



            function l_check_phone() {
                var orginal_number = phone_number.getNumber(intlTelInputUtils.numberFormat.E164);
                var country_code = phone_number.getSelectedCountryData(orginal_number)['dialCode'];
                $("input[name='contact']").val(orginal_number);
                $("input[name='country_code']").val(country_code);
                if ((orginal_number.length) < 10) {
                    $("#lo-verify-number").addClass("is-invalid");
                    return false;
                } else {
                    return true;
                }
            }
        </script>
